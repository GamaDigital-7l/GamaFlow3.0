server {
  listen 80;
  server_name localhost;

  # Define a raiz onde os arquivos estáticos do build estão
  root /usr/share/nginx/html;
  index index.html;

  # Configuração crucial para SPAs:
  # Tenta servir o arquivo diretamente ($uri), depois tenta um diretório ($uri/),
  # e se falhar, retorna o index.html para que o React Router possa lidar com a rota.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Configurações de cache e segurança (opcional, mas recomendado)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
    expires 30d;
    add_header Cache-Control "public, no-transform";
  }

  # Desabilita o envio de informações da versão do Nginx
  server_tokens off;
}